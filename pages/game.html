<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orbit Eats - Game</title>
  <link rel="icon" type="image/svg+xml" href="../game/favicon.svg">
  <link rel="stylesheet" href="../styles/global.css">
  <link rel="stylesheet" href="../styles/game.css">
</head>
<body>
  <nav class="site-nav">
    <a class="nav-logo" href="../index.html">ORBIT EATS</a>
    <button class="nav-toggle" aria-label="Toggle menu">&#9776;</button>
    <div class="nav-links">
      <a href="restaurants.html">Restaurants</a>
      <a href="review-order.html">Review Order</a>
      <a href="checkout.html">Checkout</a>
      <a href="game.html">Game</a>
    </div>
    <a href="#" class="nav-auth-btn">Sign Up / Log In</a>
  </nav>
  <main>
    <section class="shell" aria-label="Orbit Eats Delivery Traffic">
      <div class="topbar">
        <div class="title"><img src="../game/favicon.svg" alt=""> Orbit Eats Delivery Traffic</div>
        <div class="hint">
          <span class="kbd">A</span>/<span class="kbd">D</span> or
          <span class="kbd">&larr;</span>/<span class="kbd">&rarr;</span> &bull;
          <span class="kbd">Space</span> shoot &bull;
          <span class="kbd">P</span> pause &bull;
          <span class="kbd">R</span> restart
        </div>
      </div>

      <div class="stage">
        <div class="game-hud" aria-live="polite">
          <span>Score: <strong id="score">0</strong></span>
          <span>Lives: <strong id="lives">3</strong></span>
          <span>Best: <strong id="best">0</strong></span>
        </div>
        <canvas id="orbitGame" width="720" height="540" aria-label="Orbit Eats arcade game"></canvas>
      </div>

      <div class="game-footer">
        <span>Shoot the green delivery grid.</span>
        <span>Dodge the red return fire.</span>
        <button id="restartGame" type="button">Restart</button>
      </div>
    </section>
  </main>
  <footer class="site-footer">
    <span class="footer-brand">ORBIT EATS</span>
    <div class="footer-links">
      <a href="#">About</a>
      <a href="#">Privacy</a>
      <a href="#">Terms</a>
      <a href="#">Contact</a>
    </div>
  </footer>

  <script>
    document.querySelector('.nav-toggle').addEventListener('click', function() {
      document.querySelector('.site-nav').classList.toggle('open');
    });

    const canvas = document.getElementById('orbitGame');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const bestEl = document.getElementById('best');
    const restartButton = document.getElementById('restartGame');
    const logo = new Image();
    logo.src = '../game/favicon.svg';

    const keys = { left: false, right: false, shoot: false };
    const ship = { x: 336, y: 474, w: 48, h: 42, speed: 390 };
    const bricks = [];
    const playerBullets = [];
    const enemyBullets = [];
    let score = 0;
    let lives = 3;
    let best = loadBest();
    let level = 1;
    let shootTimer = 0;
    let enemyShootTimer = 1.1;
    let lastTime = 0;
    let gameOver = false;
    let paused = false;

    bestEl.textContent = best;

    function loadBest() {
      try {
        return Number(localStorage.getItem('orbitShooterBest') || 0);
      } catch (error) {
        return 0;
      }
    }

    function saveBest(value) {
      try {
        localStorage.setItem('orbitShooterBest', String(value));
      } catch (error) {
        // The game still works if browser storage is unavailable.
      }
    }

    function buildBricks() {
      bricks.length = 0;
      const cols = 10;
      const rows = 5;
      const gap = 8;
      const w = 54;
      const h = 24;
      const startX = (canvas.width - cols * w - (cols - 1) * gap) / 2;
      const startY = 74;

      for (let row = 0; row < rows; row += 1) {
        for (let col = 0; col < cols; col += 1) {
          bricks.push({
            x: startX + col * (w + gap),
            y: startY + row * (h + gap),
            w,
            h,
            alive: true,
            color: '#22c55e'
          });
        }
      }
    }

    function resetGame() {
      score = 0;
      lives = 3;
      level = 1;
      shootTimer = 0;
      enemyShootTimer = 1.1;
      gameOver = false;
      paused = false;
      ship.x = canvas.width / 2 - ship.w / 2;
      playerBullets.length = 0;
      enemyBullets.length = 0;
      buildBricks();
      updateHud();
    }

    function updateHud() {
      scoreEl.textContent = score;
      livesEl.textContent = lives;
      bestEl.textContent = best;
    }

    function overlaps(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function drawBackground() {
      const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
      gradient.addColorStop(0, '#050711');
      gradient.addColorStop(1, '#0d1022');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.save();
      ctx.globalAlpha = 0.08;
      if (logo.complete && logo.naturalWidth) {
        ctx.drawImage(logo, canvas.width / 2 - 98, canvas.height / 2 - 95, 196, 188);
      }
      ctx.restore();

      ctx.strokeStyle = 'rgba(124, 58, 237, 0.18)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(canvas.width / 2, canvas.height + 210, 360, 0, Math.PI * 2);
      ctx.stroke();

      ctx.fillStyle = 'rgba(255,255,255,0.62)';
      for (let i = 0; i < 58; i += 1) {
        const x = (i * 89) % canvas.width;
        const y = (i * 47 + score * 3) % canvas.height;
        ctx.fillRect(x, y, 2, 2);
      }
    }

    function drawBricks() {
      bricks.forEach(function(brick) {
        if (!brick.alive) return;
        ctx.shadowColor = brick.color;
        ctx.shadowBlur = 14;
        ctx.fillStyle = brick.color;
        ctx.fillRect(brick.x, brick.y, brick.w, brick.h);
        ctx.shadowBlur = 0;
        ctx.fillStyle = 'rgba(255,255,255,0.18)';
        ctx.fillRect(brick.x + 5, brick.y + 5, brick.w - 10, 4);
      });
    }

    function drawShip() {
      ctx.save();
      ctx.translate(ship.x + ship.w / 2, ship.y + ship.h / 2);
      ctx.shadowColor = '#e8e830';
      ctx.shadowBlur = 18;
      ctx.fillStyle = '#e8e830';
      ctx.beginPath();
      ctx.moveTo(0, -24);
      ctx.lineTo(25, 20);
      ctx.lineTo(9, 14);
      ctx.lineTo(0, 24);
      ctx.lineTo(-9, 14);
      ctx.lineTo(-25, 20);
      ctx.closePath();
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#7c3aed';
      ctx.fillRect(-7, 2, 14, 14);
      ctx.restore();
    }

    function drawBullets() {
      playerBullets.forEach(function(bullet) {
        ctx.shadowColor = '#e8e830';
        ctx.shadowBlur = 10;
        ctx.fillStyle = '#e8e830';
        ctx.fillRect(bullet.x, bullet.y, bullet.w, bullet.h);
      });
      enemyBullets.forEach(function(bullet) {
        ctx.shadowColor = '#fb7185';
        ctx.shadowBlur = 10;
        ctx.fillStyle = '#fb7185';
        ctx.fillRect(bullet.x, bullet.y, bullet.w, bullet.h);
      });
      ctx.shadowBlur = 0;
    }

    function drawMessage(title, detail) {
      ctx.fillStyle = 'rgba(7,10,18,0.72)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#ffffff';
      ctx.textAlign = 'center';
      ctx.font = '700 42px Exo, sans-serif';
      ctx.fillText(title, canvas.width / 2, 246);
      ctx.font = '24px Genos, sans-serif';
      ctx.fillText(detail, canvas.width / 2, 288);
    }

    function loseLife() {
      lives -= 1;
      if (lives <= 0) {
        gameOver = true;
      } else {
        ship.x = canvas.width / 2 - ship.w / 2;
        playerBullets.length = 0;
        enemyBullets.length = 0;
        enemyShootTimer = 0.9;
      }
      updateHud();
    }

    function shoot() {
      if (gameOver || paused || shootTimer > 0) return;
      playerBullets.push({ x: ship.x + ship.w / 2 - 3, y: ship.y - 14, w: 6, h: 18, vy: 560 });
      shootTimer = 0.22;
    }

    function enemyShoot() {
      const alive = bricks.filter(function(brick) { return brick.alive; });
      if (!alive.length) return;
      const brick = alive[Math.floor(Math.random() * alive.length)];
      enemyBullets.push({ x: brick.x + brick.w / 2 - 3, y: brick.y + brick.h + 4, w: 6, h: 16, vy: 150 + level * 25 });
    }

    function update(delta) {
      if (gameOver || paused) return;

      if (keys.left) ship.x -= ship.speed * delta;
      if (keys.right) ship.x += ship.speed * delta;
      if (keys.shoot) shoot();
      ship.x = Math.max(18, Math.min(canvas.width - ship.w - 18, ship.x));

      shootTimer -= delta;
      enemyShootTimer -= delta;
      if (enemyShootTimer <= 0) {
        enemyShoot();
        enemyShootTimer = Math.max(0.34, 1.05 - level * 0.08 - score * 0.0015);
      }

      for (let i = playerBullets.length - 1; i >= 0; i -= 1) {
        const bullet = playerBullets[i];
        bullet.y -= bullet.vy * delta;
        if (bullet.y + bullet.h < 0) {
          playerBullets.splice(i, 1);
          continue;
        }

        for (let j = 0; j < bricks.length; j += 1) {
          const brick = bricks[j];
          if (!brick.alive || !overlaps(bullet, brick)) continue;
          brick.alive = false;
          playerBullets.splice(i, 1);
          score += 10;
          if (score > best) {
            best = score;
            saveBest(best);
          }
          if (bricks.every(function(nextBrick) { return !nextBrick.alive; })) {
            level += 1;
            playerBullets.length = 0;
            enemyBullets.length = 0;
            buildBricks();
          }
          updateHud();
          break;
        }
      }

      for (let i = enemyBullets.length - 1; i >= 0; i -= 1) {
        const bullet = enemyBullets[i];
        bullet.y += bullet.vy * delta;
        if (bullet.y > canvas.height) {
          enemyBullets.splice(i, 1);
        } else if (overlaps(bullet, ship)) {
          enemyBullets.splice(i, 1);
          loseLife();
        }
      }
    }

    function draw() {
      drawBackground();
      drawBricks();
      drawBullets();
      drawShip();

      if (gameOver) {
        drawMessage('Route Failed', 'Press R or Restart to try again');
      } else if (paused) {
        drawMessage('Paused', 'Press P to resume');
      }
    }

    function loop(time) {
      const delta = Math.min((time - lastTime) / 1000 || 0, 0.033);
      lastTime = time;
      update(delta);
      draw();
      requestAnimationFrame(loop);
    }

    window.addEventListener('keydown', function(event) {
      if (event.key === 'ArrowLeft' || event.key.toLowerCase() === 'a') {
        event.preventDefault();
        keys.left = true;
      }
      if (event.key === 'ArrowRight' || event.key.toLowerCase() === 'd') {
        event.preventDefault();
        keys.right = true;
      }
      if (event.key === ' ' || event.key === 'Enter') {
        event.preventDefault();
        keys.shoot = true;
        shoot();
      }
      if (event.key.toLowerCase() === 'p') paused = !paused;
      if (event.key.toLowerCase() === 'r') resetGame();
    });

    window.addEventListener('keyup', function(event) {
      if (event.key === 'ArrowLeft' || event.key.toLowerCase() === 'a') keys.left = false;
      if (event.key === 'ArrowRight' || event.key.toLowerCase() === 'd') keys.right = false;
      if (event.key === ' ' || event.key === 'Enter') keys.shoot = false;
    });

    canvas.addEventListener('pointerdown', function(event) {
      moveShipTo(event.clientX);
      shoot();
    });

    canvas.addEventListener('pointermove', function(event) {
      if (event.buttons !== 1 && event.pointerType !== 'touch') return;
      moveShipTo(event.clientX);
    });

    function moveShipTo(clientX) {
      const rect = canvas.getBoundingClientRect();
      const scale = canvas.width / rect.width;
      ship.x = Math.max(18, Math.min(canvas.width - ship.w - 18, (clientX - rect.left) * scale - ship.w / 2));
    }

    restartButton.addEventListener('click', resetGame);
    logo.addEventListener('load', draw);

    resetGame();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
