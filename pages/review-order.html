<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orbit Eats - Review Order</title>
  <link rel="stylesheet" href="../styles/global.css">
  <link rel="stylesheet" href="../styles/checkout.css">
  <link rel="stylesheet" href="../styles/review-order.css">
</head>
<body>

  <orbit-navbar base="../"></orbit-navbar>

  <main class="checkout-page">
    <header class="checkout-header">
      <h1 class="checkout-page-title">Review Order</h1>
    </header>

    <section class="checkout-content">
      <div class="checkout-grid">

        <!-- LEFT SIDE -->
        <div class="checkout-main">

          <!-- Delivery -->
          <section class="checkout-card">
            <h2 class="checkout-card-title">Delivery</h2>

            <div class="address-block">
              <label class="field-label">Delivery address</label>
              <div class="address-text" id="review-delivery-address">
                Loading address...
              </div>
            </div>
          </section>

          <!-- Payment -->
          <section class="checkout-card">
            <h2 class="checkout-card-title">Payment</h2>

            <div class="address-block">
              <label class="field-label">Payment method</label>
              <div class="address-text" id="review-payment-method">
                Loading payment...
              </div>
            </div>
          </section>

        </div>

        <!-- RIGHT SIDE (SUMMARY) -->
        <aside class="checkout-aside">
          <section class="checkout-card">

            <h2 class="checkout-card-title">Order summary</h2>

            <ul class="order-lines" id="review-order-lines"></ul>

            <div class="summary-rows">

              <div class="summary-row">
                <span>Subtotal</span>
                <strong id="review-subtotal"></strong>
              </div>

              <div class="summary-row">
                <span>Sales tax</span>
                <strong id="review-tax"></strong>
              </div>

              <div class="summary-row">
                <span>Service fee</span>
                <strong id="review-service-fee"></strong>
              </div>

              <div class="summary-row">
                <span>Delivery fee</span>
                <strong id="review-delivery-fee"></strong>
              </div>

              <div class="summary-row">
                <span>Tip</span>
                <strong id="review-tip"></strong>
              </div>

              <div class="summary-row summary-row-total">
                <span>Total</span>
                <strong id="review-total"></strong>
              </div>

            </div>

            <!-- ACTIONS -->
            <div class="checkout-place-order-wrap">
              <a href="checkout.html" class="checkout-btn-secondary" style="display:block; margin-bottom:10px;">
                Back to checkout
              </a>

              <button class="checkout-btn-primary" id="btn-confirm">
                Confirm order
              </button>
            </div>

          </section>
        </aside>

      </div>
    </section>
  </main>

  <orbit-footer></orbit-footer>

  <script type="module" src="../dist/main.js"></script>
  <script src="../dist/review-order.js"></script>
</body>
</html>
